name: Deploy ADF Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'adf/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM Template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: aer-oilgas-rg
          template: ./adf/arm_template/ARMTemplateForFactory.json
          parameters: ./adf/arm_template/ARMTemplateParametersForFactory.json
